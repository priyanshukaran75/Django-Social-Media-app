{% extends "activity/base.html" %}
{% block title %}Add a comment{% endblock %}
{% block content %}
<div class="comment-input">
    <form action="{% url 'post_comment' post.id %}" method="post">
        {% csrf_token %}

        <input type="text"
               name="body"
               placeholder="Write a comment..."
               required>

        <button type="submit">
            Post
        </button>
    </form>
</div>
{% endblock %}
